function __sendGPSPeriodico() {
  if (!TRACKING_ENABLED || !rider || !rider.id) return;
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(pos) {
    var data = {
      deliveryId: rider.id,
      deliveryNombre: rider.nombre || '',
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      hora: new Date().toISOString(),
      accuracy: Math.round(pos.coords.accuracy || 0)
    };
    fetch(TRACKING_BACKEND + '/update', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
      keepalive: true
    }).then(function(r) {
      _trackingFailCount = 0;
      _trackingLastSentAt = Date.now();
    }).catch(function(err) {
      _trackingFailCount++;

        console.log('[GPS] backend no responde, tracking pausado');

      lat: null,
      lng: null,
      hora: new Date().toISOString(),
      extra: extra || {}
    });
  }, {enableHighAccuracy: true, timeout: 8000, maximumAge: 30000});
}

function __postEvento(payload) {
  if (!TRACKING_ENABLED) return;
  fetch(TRACKING_BACKEND + '/evento', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload),

  }).catch(function() { /* silencioso */ });
}

function __iniciarTracking() {
  if (_trackingInterval) clearInterval(_trackingInterval);
  // Mandar inmediatamente y después cada 5 min
  __sendGPSPeriodico();
  _trackingInterval = setInterval(__sendGPSPeriodico, 5 * 60 * 1000);
}

function __detenerTracking() {
  if (_trackingInterval) {
    clearInterval(_trackingInterval);
    _trackingInterval = null;
  }
}

  'JOSE AUGUSTO SALDIVAR':32, 'ITA':35, 'VILLETA':35, 'GUARAMBARE':35
};

// Variable global de la posición actual del delivery (cuando aprieta "Mi ubicación")
var MI_LAT = null;
var MI_LNG = null;
// Usar fecha LOCAL (no UTC) para evitar bugs por zona horaria de Paraguay
var _hoyD = new Date();
var HOY = _hoyD.getFullYear() + '-' + String(_hoyD.getMonth()+1).padStart(2,'0') + '-' + String(_hoyD.getDate()).padStart(2,'0');

// Normalizar nombres de ciudad (sin tildes, mayúsculas)
function normCity(n) {
  if (!n) return '';
  return String(n).toUpperCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\./g,'').replace(/\s+/g,' ');
}
// Costo de envío — PRIORIDAD: tarifa del delivery logueado > tarifa global
// Esto es lo que el delivery cobra a Edgar por entregar en cada ciudad.
function costoCiudad(ciudad) {
  var n = normCity(ciudad);
  // 1) Tarifa específica del delivery logueado (si está cargada en Equipo)
  if (rider && rider.id && TARIFAS_RIDER && TARIFAS_RIDER[rider.id]) {
    var mias = TARIFAS_RIDER[rider.id];
    if (mias[n] != null && mias[n] !== '') return +mias[n];
    // Match por similitud
    for (var k in mias) {
      if (normCity(k) === n && mias[k] !== '') return +mias[k];
    }
  }
  // 2) Tarifa global (fallback)
  if (COSTOS_CIUDAD && COSTOS_CIUDAD[n] != null) return +COSTOS_CIUDAD[n];
  if (COSTOS_CIUDAD) {
    for (var k in COSTOS_CIUDAD) {
      if (normCity(k) === n) return +COSTOS_CIUDAD[k];
    }
  }
  return +ENVIO_DEFAULT || 20000;
}
// Orden de cercanía (índice menor = más cerca de Luque)
function ordenCity(ciudad) {
  var n = normCity(ciudad);
  if (!ORDEN_CERCANIA) return 999;
  for (var i = 0; i < ORDEN_CERCANIA.length; i++) {
    if (normCity(ORDEN_CERCANIA[i]) === n) return i;
  }
  return 999;
}

var rider = null;
var estados = {};
var motivos = {};
var costoServ = 0;
var stockAsig = {};
var ventasExtra = {};
var msgTel = '';
var motiId = '';

function lsR(k) {
  try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function lsW(k, v) {

}
function save() {

function waNum(tel) {

  if (n.indexOf('595') === 0) return n;

function showToast(m) {

  t.textContent = m;
  t.classList.add('on');
  setTimeout(function() { t.classList.remove('on'); }, 2500);

function mis() {
  // Filtrar pedidos del rider logueado y ordenar por cercanía desde Luque
  var lista = PEDIDOS.slice();
  // Si el rider está logueado, filtrar solo los suyos
  if (rider && rider.id) {
    lista = lista.filter(function(p){ return !p.rider || p.rider === rider.id; });
  }

  // ¿Hay orden manual guardado por el delivery?
  var ordenManual = lsR('mip_d_orden_' + HOY);

  if (ordenManual && Array.isArray(ordenManual) && ordenManual.length > 0) {
    // Aplicar el orden manual. Pedidos que no estén en el orden, van al final.
    var byId = {};
    lista.forEach(function(p) { byId[p.id] = p; });
    var ordenadosManual = [];
    ordenManual.forEach(function(id) {
      if (byId[id]) {
        ordenadosManual.push(byId[id]);
        delete byId[id];
      }
    });
    // Pedidos nuevos (no en el orden manual) van al final
    Object.keys(byId).forEach(function(id) { ordenadosManual.push(byId[id]); });
    lista = ordenadosManual;
  } else {
    // Orden default: por cercanía a la posición actual del delivery (si la cargó),
    // sino por orden de cercanía configurado en Centro
    if (MI_LAT && MI_LNG) {
      // Calcular distancia y minutos desde MI_LAT/LNG a cada pedido
      lista.forEach(function(p) {
        var coords = getCoordsPedido(p);
        if (coords) {
          p._distKm = haversine(MI_LAT, MI_LNG, coords.lat, coords.lng);
          p.distMin = Math.round((p._distKm * 1.4 / 30) * 60);  // 30 km/h promedio
        } else {
          p._distKm = 9999;
          p.distMin = 0;
        }
      });
      lista.sort(function(a, b) { return (a._distKm||9999) - (b._distKm||9999); });
    } else {
      // Orden por cercanía a Luque (config Centro) + nombre
      lista.sort(function(a, b) {
        var oa = ordenCity(a.ciudad);
        var ob = ordenCity(b.ciudad);
        if (oa !== ob) return oa - ob;
        return (a.cliente || '').localeCompare(b.cliente || '');
      });
    }
  }
  // ── v28: Calcular minutos estimados SIEMPRE (incluso sin GPS del delivery) ──
  // Si no hay MI_LAT, usamos Luque como origen por default así el delivery siempre
  // ve el badge de minutos al lado de cada cliente.
  // Si después aprieta "Mi ubicación" u "Optimizar", se recalcula desde el GPS real.
  var origenDefault = COORDS_CIUDAD['LUQUE'] || {lat: -25.270, lng: -57.487};
  for (var k = 0; k < lista.length; k++) {
    var pp = lista[k];
    // Solo recalcular si no fue calculado ya con MI_LAT/MI_LNG
    if (!pp.distMin || pp.distMin === 0) {
      var coordsPP = getCoordsPedido(pp);
      if (coordsPP) {
        var distKmPP = haversine(origenDefault.lat, origenDefault.lng, coordsPP.lat, coordsPP.lng);
        pp.distMin = Math.round((distKmPP * 1.4 / 30) * 60);
      }
    }
  }
  return lista;
}

// Devuelve {lat, lng} del pedido (propio o fallback a coords de ciudad)
function getCoordsPedido(p) {
  if (p.lat && p.lng) return {lat:p.lat, lng:p.lng};
  var c = normCity(p.ciudad);
  if (COORDS_CIUDAD[c]) return COORDS_CIUDAD[c];
  return null;
}

// Guardar orden manual de pedidos
function guardarOrdenManual(idsArray) {
  lsW('mip_d_orden_' + HOY, idsArray);
}

// Limpiar orden manual (para volver al default)
function limpiarOrdenManual() {
  if (typeof localStorage !== 'undefined') {
    localStorage.removeItem('mip_d_orden_' + HOY);
  }
}

// ════════════════════════════════════════════════════════════════
// OPTIMIZACIÓN DE RUTA (v26)
// Dos algoritmos para encontrar la mejor secuencia de entregas:
// 1) GRATIS: Nearest Neighbor + 2-opt (corre local, sin internet)
// 2) GOOGLE: Directions API con waypoint optimization (calles + tráfico real)
// Ambos respetan los pedidos que el delivery ya marcó como urgentes.
// ════════════════════════════════════════════════════════════════

// Helper: distancia haversine en km entre dos puntos lat/lng
function distKm(a, b) {
  return haversine(a.lat, a.lng, b.lat, b.lng);
}

// Algoritmo Nearest Neighbor: elige el punto más cercano cada vez
function nearestNeighbor(start, points) {
  if (!points.length) return [];
  var remaining = points.slice();
  var route = [];
  var current = start;
  while (remaining.length) {
    var bestIdx = 0;
    var bestDist = distKm(current, remaining[0]);
    for (var i = 1; i < remaining.length; i++) {
      var d = distKm(current, remaining[i]);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    var next = remaining.splice(bestIdx, 1)[0];
    route.push(next);
    current = next;
  }
  return route;
}

// Algoritmo 2-opt: mejora una ruta dada haciendo swaps que reducen distancia total
function twoOpt(start, route) {
  if (route.length < 3) return route;
  var best = route.slice();
  var improved = true;
  var maxIters = 100; // safety
  while (improved && maxIters-- > 0) {
    improved = false;
    for (var i = 0; i < best.length - 1; i++) {
      for (var j = i + 1; j < best.length; j++) {
        // Calcular distancia antes del swap
        var prevI = i === 0 ? start : best[i - 1];
        var nextJ = j + 1 < best.length ? best[j + 1] : null;
        var d1 = distKm(prevI, best[i]) + (nextJ ? distKm(best[j], nextJ) : 0);
        // Distancia después del swap (invertir segmento i..j)
        var d2 = distKm(prevI, best[j]) + (nextJ ? distKm(best[i], nextJ) : 0);
        if (d2 < d1 - 0.001) {
          // Invertir best[i..j]
          var seg = best.slice(i, j + 1).reverse();
          best = best.slice(0, i).concat(seg).concat(best.slice(j + 1));
          improved = true;
        }
      }
    }
  }
  return best;
}

// Calcular distancia total de una ruta dada
function distanciaTotalRuta(start, route) {
  if (!route.length) return 0;
  var total = distKm(start, route[0]);
  for (var i = 1; i < route.length; i++) total += distKm(route[i - 1], route[i]);
  return total;
}

// Optimizar GRATIS (Nearest Neighbor + 2-opt)
function optimizarGratis(start, pedidosOptimizables) {
  // Convertir pedidos a puntos {id, lat, lng}
  var puntos = [];
  for (var i = 0; i < pedidosOptimizables.length; i++) {
    var p = pedidosOptimizables[i];
    var c = getCoordsPedido(p);
    if (c) puntos.push({ id: p.id, lat: c.lat, lng: c.lng });
  }
  if (!puntos.length) return { ok: false, motivo: 'Ningún pedido tiene coordenadas para optimizar.' };
  // 1) Nearest Neighbor
  var ruta = nearestNeighbor(start, puntos);
  // 2) 2-opt para mejorar
  ruta = twoOpt(start, ruta);
  var distTotal = distanciaTotalRuta(start, ruta);
  return {
    ok: true,
    orden: ruta.map(function(p) { return p.id; }),
    distKm: distTotal,
    minutos: Math.round(distTotal * 1.4 / 30 * 60), // factor 1.4 para calles reales, 30 km/h promedio
    motor: 'Algoritmo local (Nearest Neighbor + 2-opt)'
  };
}

// Optimizar con GOOGLE Directions API
// Necesita una API key guardada en localStorage 'mip_google_api_key'
function optimizarGoogle(start, pedidosOptimizables, callback) {
  // PRIORIDAD: API key local (cargada por el delivery) > heredada del Centro de Despacho
  var apiKey = lsR('mip_google_api_key') || '';
  if (!apiKey && typeof GOOGLE_API_KEY === 'string' && GOOGLE_API_KEY.length >= 20) {
    apiKey = GOOGLE_API_KEY;
  }
  if (!apiKey || typeof apiKey !== 'string' || apiKey.length < 20) {
    callback({ ok: false, motivo: 'Falta configurar la API key de Google. Edgar tiene que cargarla en el Centro de Despacho, o vos podés cargarla en Guía → Configurar Google API.' });
    return;
  }
  // Convertir pedidos a waypoints
  var puntos = [];
  for (var i = 0; i < pedidosOptimizables.length; i++) {
    var p = pedidosOptimizables[i];
    var c = getCoordsPedido(p);
    if (c) puntos.push({ id: p.id, lat: c.lat, lng: c.lng });
  }
  if (!puntos.length) {
    callback({ ok: false, motivo: 'Ningún pedido tiene coordenadas para optimizar.' });
    return;
  }
  if (puntos.length > 23) {
    callback({ ok: false, motivo: 'Google Directions API soporta máximo 23 paradas. Usá el algoritmo gratis.' });
    return;
  }
  // Armar URL con origen=start, destination=último punto, waypoints=optimize:true|p1|p2|...
  // Usamos el origen también como destino (ruta vuelve a Luque/origen)
  var waypoints = 'optimize:true|' + puntos.map(function(p) { return p.lat + ',' + p.lng; }).join('|');
  var url = 'https://maps.googleapis.com/maps/api/directions/json' +
            '?origin=' + start.lat + ',' + start.lng +
            '&destination=' + start.lat + ',' + start.lng +
            '&waypoints=' + encodeURIComponent(waypoints) +
            '&mode=driving' +
            '&departure_time=now' +
            '&key=' + apiKey;
  // Usar fetch
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status !== 'OK') {
        callback({ ok: false, motivo: 'Google respondió: ' + (data.status || 'error') + (data.error_message ? ' - ' + data.error_message : '') });
        return;
      }
      var ruta = data.routes[0];
      var orderIdxs = ruta.waypoint_order; // [2, 0, 1, 3] = los waypoints en orden óptimo
      var orderedIds = orderIdxs.map(function(idx) { return puntos[idx].id; });
      // Sumar distancias y tiempos de cada leg (incluye vuelta al origen)
      var distMetros = 0, segs = 0;
      for (var l = 0; l < ruta.legs.length; l++) {
        distMetros += ruta.legs[l].distance.value;
        segs += (ruta.legs[l].duration_in_traffic && ruta.legs[l].duration_in_traffic.value) || ruta.legs[l].duration.value;
      }
      callback({
        ok: true,
        orden: orderedIds,
        distKm: distMetros / 1000,
        minutos: Math.round(segs / 60),
        motor: 'Google Directions (calles + tráfico real)'
      });
    })
    .catch(function(err) {
      callback({ ok: false, motivo: 'Error de red: ' + (err.message || 'no se pudo contactar Google') });
    });
}

// FLUJO DE OPTIMIZACIÓN: pide GPS, pregunta sobre orden manual,
// optimiza, muestra propuesta, pide confirmación, aplica.
// ────────────────────────────────────────────────────────────────

var _optMotor = 'gratis'; // 'gratis' o 'google' — qué motor está pidiendo el usuario
var _optStart = null;
var _optPedidosTodos = null;
var _optPedidosFijos = null; // los que NO se optimizan (urgentes/pinneados)

function pedirOptimizar(motor) {
  _optMotor = motor;
  // Verificar GPS disponible
  if (!navigator.geolocation) {
    alert('Tu navegador no soporta GPS. Usá las flechitas para ordenar manualmente.');
    return;
  }
  // Pedir ubicación actual
  showToast('📡 Obteniendo tu ubicación...');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      _optStart = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      MI_LAT = _optStart.lat;
      MI_LNG = _optStart.lng;
      // Buscar pedidos pendientes (los entregados/cancelados no se optimizan)
      var mp = mis();
      var pendientes = [];
      for (var i = 0; i < mp.length; i++) {
        var st = estados[mp[i].id] || 'pendiente';
        if (st === 'pendiente') pendientes.push(mp[i]);
      }
      if (pendientes.length < 2) {
        alert('Necesitás al menos 2 pedidos pendientes para optimizar.');
        return;
      }
      _optPedidosTodos = pendientes;
      // ¿Hay orden manual previo?
      var ordenManual = lsR('mip_d_orden_' + HOY);
      if (ordenManual && Array.isArray(ordenManual) && ordenManual.length > 0) {
        // Preguntar qué hacer con el orden manual
        mostrarSheetOrdenManual();
      } else {
        _optPedidosFijos = [];
        ejecutarOptimizacion();
      }
    },
    function(err) {
      var msg = '❌ No pude obtener tu ubicación. ';
      if (err.code === 1) msg += 'Necesitás darle permiso al navegador.';
      else if (err.code === 2) msg += 'Verificá tu GPS.';
      else msg += 'Probá de nuevo.';
      alert(msg);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

function optCerrarSheet() {
  var bg = document.getElementById('_optSheetBg');
  if (bg) bg.remove();
}

function optAplicarRespetarManual() {
  optCerrarSheet();
  // Los pedidos que tienen orden manual definido = "fijos"
  // El resto se optimiza
  var ordenManual = lsR('mip_d_orden_' + HOY) || [];
  var idsManual = {};
  for (var i = 0; i < ordenManual.length; i++) idsManual[ordenManual[i]] = true;
  var fijos = [];
  var optimizables = [];
  // Los fijos van en el orden actual de mp (que ya respeta el manual)
  for (var i = 0; i < _optPedidosTodos.length; i++) {
    if (idsManual[_optPedidosTodos[i].id]) fijos.push(_optPedidosTodos[i]);
    else optimizables.push(_optPedidosTodos[i]);
  }
  _optPedidosFijos = fijos;
  _optPedidosTodos = optimizables;
  ejecutarOptimizacion();
}

function optAplicarReordenarTodo() {
  optCerrarSheet();
  _optPedidosFijos = [];
  ejecutarOptimizacion();
}

function ejecutarOptimizacion() {
  showToast('⚡ Calculando mejor ruta...');
  var procesarResultado = function(resultado) {
    if (!resultado.ok) {
      alert('No se pudo optimizar: ' + resultado.motivo);
      return;
    }
    // Armar el orden final: primero los fijos en su orden, después los optimizados
    var ordenFinal = _optPedidosFijos.map(function(p) { return p.id; }).concat(resultado.orden);
    mostrarPropuesta(ordenFinal, resultado);
  };
  if (_optMotor === 'google') {
    optimizarGoogle(_optStart, _optPedidosTodos, procesarResultado);
  } else {
    var resultado = optimizarGratis(_optStart, _optPedidosTodos);
    procesarResultado(resultado);
  }
}

  bg.id = '_optPropuestaBg';
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:14px;padding:18px;max-width:430px;width:100%;max-height:85vh;overflow-y:auto;';
  box.innerHTML =
    '<div style="font-size:18px;font-weight:900;color:#e8400c;margin-bottom:4px;">⚡ Ruta optimizada</div>' +
    '<div style="font-size:11px;color:#666;margin-bottom:14px;">' + resultado.motor + '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">' +
      '<div style="background:#f7f7f7;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:900;color:#000;">' + dist + ' km</div><div style="font-size:10px;color:#999;font-weight:700;">DISTANCIA TOTAL</div></div>' +
      '<div style="background:#f7f7f7;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:900;color:#000;">' + resultado.minutos + ' min</div><div style="font-size:10px;color:#999;font-weight:700;">TIEMPO ESTIMADO</div></div>' +

function cargarLeafletRider(cb) {
  if (_riderLeafletLoaded && window.L) { cb(); return; }
  if (!document.getElementById('lflcss')) {
    var link = document.createElement('link');
    link.id = 'lflcss';
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
    document.head.appendChild(link);
  }
  if (window.L) { _riderLeafletLoaded = true; cb(); return; }
  var urls = [
    'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js',
    'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'
  ];
  function tr(i) {
    if (i >= urls.length) { alert('No se pudo cargar el mapa. Verificá tu internet.'); return; }
    var s = document.createElement('script');
    s.src = urls[i];
    s.onload = function() { _riderLeafletLoaded = true; cb(); };
    s.onerror = function() { tr(i + 1); };
    document.head.appendChild(s);
  }
  tr(0);
}

  }).addTo(_riderMap);

  // Pin de MI ubicación

    var miIcon = L.divIcon({

        if (m) { lat = +m[1]; lng = +m[2]; }
        else {
          m = p.link.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
          if (m) { lat = +m[1]; lng = +m[2]; }
        }
      } catch(e){}
    }
    if (!lat || !lng) {
      // Sin coords, usar coords aproximadas de la ciudad

      }

      iconSize: [36,36], iconAnchor: [18,18]
    });

    var total = (p.precio || 0) * (p.cant || 1);

      '<div style="font-family:system-ui;min-width:200px;">' +
      '<div style="font-weight:900;font-size:14px;color:#000;">' + (idx+1) + '. ' + (p.cliente || '—') + '</div>' +
      '<div style="font-size:12px;color:#444;margin-top:4px;">' + (p.ciudad || '') + '</div>' +
      '<div style="font-size:12px;margin-top:6px;">' + p.prod + ' x' + p.cant + '</div>' +
      '<div style="font-weight:800;color:#e8400c;font-size:14px;margin-top:4px;">' + gs(total) + '</div>' +
      '<div style="margin-top:6px;"><a href="tel:' + p.tel + '" style="color:#1565c0;">📞 ' + p.tel + '</a></div>' +
      '</div>'
    );
    _riderMarkers.push(marker);
    bounds.push([lat, lng]);
  });
  
  if (bounds.length) {

window.moverPedidoRuta = function(pid, dir){
  var cont = document.getElementById('listaPedidosOrden');
  if(!cont) return;

  var ids = items.map(function(it){ return it.dataset.pid; });
  var i = ids.indexOf(pid);
  var j = i + dir;
  if(i<0 || j<0 || j>=ids.length) return;
  var t = ids[i]; ids[i]=ids[j]; ids[j]=t;
  // fusionar con el orden completo de mis() preservando los no listados
  var mp = mis();
  var fullIds = mp.map(function(p){ return p.id; });
  var pendSet = {}; ids.forEach(function(id){ pendSet[id]=true; });
  var pIdx = 0, nuevoFull = [];
  fullIds.forEach(function(id){
    if(pendSet[id]){ nuevoFull.push(ids[pIdx++]); }
    else { nuevoFull.push(id); }
  });
  lsW('mip_d_orden_' + HOY, nuevoFull);
  var nuevo = nuevoFull.map(function(id){ return mp.find(function(p){ return p.id===id; }); }).filter(Boolean);
  renderMapaRiderContent(nuevo);
  if (typeof renderEntregas === 'function') renderEntregas();
};

function verRutaCompletaEnMapa() {
  var mp = mis();
  var pendientes = [];
  for (var i = 0; i < mp.length; i++) {
    var st = estados[mp[i].id] || 'pendiente';
    if (st === 'pendiente') pendientes.push(mp[i]);
  }
  if (!pendientes.length) {
    alert('No tenés pedidos pendientes en la ruta para mostrar.');
    return;
  }
  if (pendientes.length > 23) {
    alert('Google Maps soporta hasta 23 paradas. Tenés ' + pendientes.length + ' pendientes. Mostrar las primeras 23.');
    pendientes = pendientes.slice(0, 23);
  }
  
  // Construir URL de Google Maps con waypoints
  // Formato: https://www.google.com/maps/dir/origen/destino1/destino2/.../destinoN
  // El último punto es el destino, los del medio son waypoints
  
  // Origen: GPS del delivery si está disponible, sino Luque
  var origen;
  if (MI_LAT && MI_LNG) {
    origen = MI_LAT + ',' + MI_LNG;
  } else {
    origen = '-25.270,-57.487'; // Luque centro como default
  }
  
  // Construir cada parada usando el LINK del cliente si está, o lat/lng, o ciudad
  var paradas = [];
  for (var i = 0; i < pendientes.length; i++) {
    var p = pendientes[i];
    var parada = '';
    if (p.lat && p.lng) {
      parada = p.lat + ',' + p.lng;
    } else if (p.link && p.link.trim()) {
      // Si tiene link, extraer coords del link si es posible
      var coords = extraerCoordsURL ? extraerCoordsURL(p.link) : null;
      if (coords) {
        parada = coords.lat + ',' + coords.lng;
      } else {
        // Si no se pueden extraer coords, usar ciudad
        parada = encodeURIComponent((p.ciudad || '') + ', Paraguay');
      }
    } else {
      parada = encodeURIComponent((p.ciudad || '') + ', Paraguay');
    }
    paradas.push(parada);
  }
  
  // Armar URL: dir/origen/parada1/parada2/.../paradaN
  var url = 'https://www.google.com/maps/dir/' + origen + '/' + paradas.join('/');
  
  // Agregar parámetros de viaje (modo conducción)
  url += '/data=!3m1!4b1!4m2!4m1!3e0';
  
  // Mostrar resumen antes de abrir
  var distEst = 0;
  if (MI_LAT && MI_LNG) {
    var prev = {lat: MI_LAT, lng: MI_LNG};
    for (var i = 0; i < pendientes.length; i++) {
      var c = getCoordsPedido(pendientes[i]);
      if (c) {
        distEst += haversine(prev.lat, prev.lng, c.lat, c.lng);
        prev = c;
      }
    }
  } else {
    var prevP = {lat: -25.270, lng: -57.487};
    for (var i = 0; i < pendientes.length; i++) {
      var c2 = getCoordsPedido(pendientes[i]);
      if (c2) {
        distEst += haversine(prevP.lat, prevP.lng, c2.lat, c2.lng);
        prevP = c2;
      }
    }
  }
  var tiempoEst = Math.round(distEst * 1.4 / 30 * 60); // 30 km/h promedio con factor calles
  
  var msg = '🗺️ RUTA COMPLETA\n\n' +
            '• Pedidos: ' + pendientes.length + '\n' +
            '• Distancia estimada: ' + distEst.toFixed(1) + ' km\n' +
            '• Tiempo estimado: ' + tiempoEst + ' min\n' +
            '• Origen: ' + (MI_LAT ? 'Tu ubicación actual' : 'Luque (default)') + '\n\n' +
            '¿Abrir en Google Maps?';
  
  if (!confirm(msg)) return;
  window.open(url, '_blank');
}

function cargarMiUbicacion() {
  if (!navigator.geolocation) {
    alert('Tu navegador no soporta geolocalización. Usá el orden default.');
    return;
  }
  showToast('📡 Obteniendo tu ubicación...');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      MI_LAT = pos.coords.latitude;
      MI_LNG = pos.coords.longitude;
      // Limpiar orden manual previo (la nueva ubicación tiene prioridad)
      limpiarOrdenManual();
      showToast('✅ Reordenado desde tu ubicación');
      renderEntregas();
    },
    function(err) {
      var msg = '❌ No pude obtener tu ubicación. ';
      if (err.code === 1) msg += 'Necesitás darle permiso al navegador.';
      else if (err.code === 2) msg += 'Verificá tu GPS.';
      else msg += 'Probá de nuevo.';
      alert(msg);
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:60000 }
  );
}

function subirPedido(idx) {

  guardarOrdenManual(ids);

function doLogin() {
  var id = document.getElementById('lNombre').value;
  var pin = document.getElementById('lPin').value.trim();
  var errEl = document.getElementById('lErr');
  errEl.textContent = '';
  if (!id) { errEl.textContent = 'Selecciona tu nombre'; return; }
  if (!pin) { errEl.textContent = 'Ingresa tu PIN'; return; }
  // Find rider from injected RIDERS data
  var found = null;
  for (var i = 0; i < RIDERS.length; i++) {
    if (RIDERS[i].id === id) {
      var configuredPin = String(RIDERS[i].pin || '').trim();
      // Aceptar PIN configurado, o '1111' como fallback si no hay PIN, o si el PIN es '1111' igual
      if (configuredPin === String(pin) || (!configuredPin && pin === '1111') || pin === '1111') {
        found = RIDERS[i]; break;
      }
    }
  }
  if (!found) { errEl.textContent = 'PIN incorrecto. Probá con 1111.'; return; }
  rider = found;
  // Cargar stock extra desde el config inyectado (nuevo) o del legacy localStorage (viejo)
  if (STOCK_EXTRA_ASIG && STOCK_EXTRA_ASIG[rider.id]) {
    stockAsig = STOCK_EXTRA_ASIG[rider.id];
  } else {
    var st = lsR('mip_stock_riders');
    if (st && st[rider.id]) stockAsig = st[rider.id];
  }
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  document.getElementById('hdrN').textContent = rider.nombre + ' - ' + HOY;
  renderEntregas();
  renderResumen();
  renderGuia();
  // v31: iniciar tracking GPS (silencioso, no muestra nada al delivery)

  __iniciarTracking();
}

// Extraer coords de URL (replicado para que esté en el template)
// IMPORTANTE: si el zoom es < 15, las coords probablemente son de la ciudad,
// no del pin real. Devolver null para usar el link bruto.
function extraerCoordsURL(url) {
  if (!url || typeof url !== 'string') return null;
  // Detectar zoom
  var zoom = null;
  var mZ = url.match(/,(\d+\.?\d*)z/);
  if (mZ) zoom = parseFloat(mZ[1]);
  if (zoom == null) {
    mZ = url.match(/[?&]z=(\d+\.?\d*)/);
    if (mZ) zoom = parseFloat(mZ[1]);
  }
  // Zoom bajo = link a la ciudad, no al pin
  if (zoom != null && zoom < 15) return null;

  var m = url.match(/[@/](-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) {
    var lat = parseFloat(m[1]); var lng = parseFloat(m[2]);
    if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) return {lat:lat, lng:lng};
  }
  m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) {
    var lat = parseFloat(m[1]); var lng = parseFloat(m[2]);
    if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) return {lat:lat, lng:lng};
  }
  m = url.match(/[?&]ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) {
    var lat = parseFloat(m[1]); var lng = parseFloat(m[2]);
    if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) return {lat:lat, lng:lng};
  }
  return null;
}

function doAvisoCerca(idx, total) {
  var mp = mis();
  if (idx < 0 || idx >= mp.length) return;
  var p = mp[idx];
  // Calcular minutos al pedido desde la ubicación actual del delivery (si la cargó)
  var minutos = 0;
  if (p.distMin && p.distMin > 0) {
    minutos = p.distMin;
  } else if (typeof MI_LAT !== 'undefined' && MI_LAT) {
    var coords = getCoordsPedido(p);
    if (coords) {
      var distKm = haversine(MI_LAT, MI_LNG, coords.lat, coords.lng) * 1.4;
      minutos = Math.round(distKm / 30 * 60);
    }
  }

// Haversine en kilómetros
function haversine(lat1, lon1, lat2, lon2) {
  if (!lat1 || !lon1 || !lat2 || !lon2) return 9999;
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
          Math.sin(dLon / 2) * Math.sin(dLon / 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function xtra(idx, delta) {
  var sp = Object.keys(stockAsig);
  if (idx < 0 || idx >= sp.length) return;
  var prod = sp[idx];
  ventasExtra[prod] = Math.max(0, (ventasExtra[prod] || 0) + delta);
  save();
  renderResumen();
}

function generarReporte() {
  var mp = mis();
  var ent = [], noe = [], pen = [];
  for (var i = 0; i < mp.length; i++) {
    var st = estados[mp[i].id] || 'pendiente';
    if (st === 'entregado') ent.push(mp[i]);
    else if (st === 'no_entregado') noe.push(mp[i]);
    else pen.push(mp[i]);
  }
  // Total cobrado bruto = lo que Carlos recibió en mano por entregas
  var cobBruto = 0;
  // Total envíos = suma de los costos de envío de cada ciudad entregada
  var totEnvios = 0;
  for (var i = 0; i < ent.length; i++) {
    cobBruto += (ent[i].precio || 0) * (ent[i].cant || 1);
    totEnvios += costoCiudad(ent[i].ciudad);
  }
  var totProductos = cobBruto - totEnvios;

  // Stock extra: ventas espontáneas en la calle
  var sp = Object.keys(stockAsig);
  var ePP = {};
  for (var i = 0; i < ent.length; i++) { var k = ent[i].prod || '?'; ePP[k] = (ePP[k] || 0) + (ent[i].cant || 1); }

  // Fecha formateada DD/MM
  var fechaFmt = HOY;
  try {
    var parts = HOY.split('-');
    fechaFmt = parts[2] + '/' + parts[1] + '/' + parts[0];
  } catch(e) {}

  var sep = '====================';
  var lin = '--------------------';
  var txt = '*CIERRE DE DIA*\n';
  txt += fechaFmt + ' - ' + (rider ? rider.nombre : '') + '\n' + sep + '\n\n';
  txt += 'Pedidos asignados: ' + mp.length + '\n';
  txt += 'Entregados: ' + ent.length + '\n';
  txt += 'Cancelados: ' + noe.length + '\n';
  if (pen.length) txt += 'Pendientes: ' + pen.length + '\n';
  txt += '\n' + lin + '\nCOBRADO\n' + lin + '\n';
  txt += 'Total cobrado bruto: ' + gs(cobBruto) + '\n';
  // Lectura A: si hay pago manual, ese reemplaza el cálculo automático de envíos
  if (costoServ > 0) {
    txt += 'Pago al delivery (manual): ' + gs(costoServ) + '\n';
    txt += '(envio sugerido por ciudad: ' + gs(totEnvios) + ' - no aplica)\n';
    txt += '*NETO a Edgar:* ' + gs(cobBruto - costoServ) + '\n';
  } else {
    txt += 'Envios sugeridos: ' + gs(totEnvios) + ' (' + ent.length + ' entregas)\n';
    txt += '*NETO a Edgar:* ' + gs(cobBruto - totEnvios) + '\n';
  }

  // Bloque STOCK
  if (sp.length) {
    var totSalio = 0, totDev = 0, totVendExtra = 0, gsExtra = 0;
    var detSalio = [], detDev = [], detExtra = [];
    for (var i = 0; i < sp.length; i++) {
      var prod = sp[i];
      var sal = stockAsig[prod] || 0;
      var eP = ePP[prod] || 0;
      var ext = ventasExtra[prod] || 0;
      var dev = Math.max(0, sal - eP - ext);
      totSalio += sal;
      totDev += dev;
      totVendExtra += ext;
      if (sal > 0) detSalio.push(sal + ' ' + prod);
      if (dev > 0) detDev.push(dev + ' ' + prod);
      if (ext > 0) {
        detExtra.push(ext + ' ' + prod);
        // Buscar precio del producto en pedidos para calcular gsExtra
        var precioRef = 0;
        for (var j = 0; j < mp.length; j++) {
          if (mp[j].prod === prod) { precioRef = mp[j].precio || 0; break; }
        }
        gsExtra += precioRef * ext;
      }
    }
    txt += '\n' + lin + '\n*STOCK DEL DIA*\n' + lin + '\n';

    // Recibido extra: cada producto en su propia fila
    txt += '*Recibido extra:* ' + totSalio + ' unidades\n';
    if (detSalio.length) {
      for (var i = 0; i < detSalio.length; i++) {
        txt += '  - ' + detSalio[i] + '\n';
      }
    }
    txt += '\n';

    // Devuelto: cada producto en su propia fila
    txt += '*Devuelto:* ' + totDev + ' unidades\n';
    if (detDev.length) {
      for (var i = 0; i < detDev.length; i++) {
        txt += '  - ' + detDev[i] + '\n';
      }
    } else if (totDev === 0) {
      txt += '  - Sin devoluciones\n';
    }
    txt += '\n';

    // Vendido extra (solo si hay ventas extra)
    if (totVendExtra > 0) {
      txt += '*Vendido extra:* ' + totVendExtra + ' unidades - ' + gs(gsExtra) + '\n';
      for (var i = 0; i < detExtra.length; i++) {
        txt += '  - ' + detExtra[i] + '\n';
      }
      txt += '\n';
    }
  }

  // Detalle ENTREGADOS
  if (ent.length) {
    txt += '\n' + lin + '\n*ENTREGADOS*\n' + lin + '\n';
    for (var i = 0; i < ent.length; i++) {
      var p = ent[i];
      var totP = (p.precio || 0) * (p.cant || 1);
      var envP = costoCiudad(p.ciudad);
      txt += (i + 1) + '. ' + p.cliente + ' - ' + p.ciudad + '\n';
      txt += '   ' + p.prod + ' x' + p.cant + ' - ' + gs(totP) + '\n';
      txt += '   (envio ' + gs(envP) + ' incluido)\n\n';
    }
  }

  // Detalle NO PUDO (antes CANCELADOS) - v31: ahora con teléfono
  if (noe.length) {
    txt += lin + '\nNO PUDO (' + noe.length + ')\n' + lin + '\n';
    for (var i = 0; i < noe.length; i++) {
      var p = noe[i];
      var totP = (p.precio || 0) * (p.cant || 1);
      txt += (i + 1) + '. ' + p.cliente + ' - ' + p.prod + ' - ' + p.ciudad + ' - ' + gs(totP) + '\n';
      if (p.tel) txt += '   Tel: ' + p.tel + '\n';
      txt += '   Motivo: ' + (motivos[p.id] || '-') + '\n\n';
    }
  }

  // v31: Detalle PENDIENTES (los que no se procesaron al final del día)
  if (pen.length) {
    txt += lin + '\nPENDIENTES (' + pen.length + ')\n' + lin + '\n';
    for (var i = 0; i < pen.length; i++) {
      var p = pen[i];
      var totP = (p.precio || 0) * (p.cant || 1);
      txt += (i + 1) + '. ' + p.cliente + ' - ' + p.prod + ' - ' + p.ciudad + ' - ' + gs(totP) + '\n';
      if (p.tel) txt += '   Tel: ' + p.tel + '\n';
      txt += '\n';
    }
  }

  return txt;
}

function copiarReporte() {
  var txt = generarReporte();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function() { showToast('Reporte copiado'); }).catch(function() { fallbackCopy(txt); });

  }
}
function fallbackCopy(txt) {
  var ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); showToast('Reporte copiado'); } catch(e) { showToast('No se pudo copiar'); }
  document.body.removeChild(ta);
}

      html += '</div>';
    });

    html += '<div style="font-weight:900;font-size:15px;color:#1a1a1a;">TOTAL</div>';
    html += '<div style="font-weight:900;font-size:22px;color:#e8400c;font-family:monospace;">Gs ' + totalGeneral.toLocaleString('es-PY') + '</div>';
    html += '</div>';
    html += '</div>';
    return html;
  } catch(e){ return ''; }
}

// ════════════════════════════════════════════════════════════════
// v51 DELIVERY — Conexión bidireccional + GPS foreground + mensajes config
// ════════════════════════════════════════════════════════════════
(function(){
'use strict';
var ESTADOS_BACKEND = (typeof TRACKING_BACKEND !== 'undefined' && TRACKING_BACKEND) ? TRACKING_BACKEND : '';

// ── 1) Reportar estado de pedido al Worker (/estados) ──
function v51ReportarEstado(pedidoId, estado, extra){
  if (!ESTADOS_BACKEND) return;
  extra = extra || {};
  var payload = {
    pedidoId: pedidoId,
    estado: estado,
    riderId: (typeof rider !== 'undefined' && rider) ? rider.id : '',
    nombreCliente: extra.cliente || '',
    monto: extra.monto || 0,
    motivo: extra.motivo || '',
    lat: (typeof MI_LAT !== 'undefined') ? MI_LAT : null,
    lng: (typeof MI_LNG !== 'undefined') ? MI_LNG : null
  };
  try {
    fetch(ESTADOS_BACKEND.replace(/\/+$/,'') + '/estados', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
      keepalive: true
    }).catch(function(){});
  } catch(e){}
}

// Hook a entregado()
if (typeof window.entregado === 'function' && !window.entregado._v51){
  var _origEntregado = window.entregado;
  window.entregado = function(id){
    var r = _origEntregado.apply(this, arguments);
    try {
      var p = null, mp = mis();
      for (var i=0;i<mp.length;i++){ if(mp[i].id===id){ p=mp[i]; break; } }
      v51ReportarEstado(id, 'entregado', p ? { cliente:p.cliente, monto:(p.precio||0)*(p.cant||1) } : {});
    } catch(e){}
    return r;
  };
  window.entregado._v51 = true;
}

// Hook a confirmarCanceladoV41()
if (typeof window.confirmarCanceladoV41 === 'function' && !window.confirmarCanceladoV41._v51){
  var _origCancel = window.confirmarCanceladoV41;
  window.confirmarCanceladoV41 = function(id){
    var ta = document.getElementById('motivoCanceladoV41');
    var motivo = (ta && ta.value || '').trim();
    var r = _origCancel.apply(this, arguments);
    try { v51ReportarEstado(id, 'no_entregado', { motivo: motivo }); } catch(e){}
    return r;
  };
  window.confirmarCanceladoV41._v51 = true;
}

// ── 2) GPS al volver a primer plano (foreground) ──
document.addEventListener('visibilitychange', function(){
  if (document.visibilityState === 'visible'){
    if (typeof __sendGPSPeriodico === 'function'){
      try { __sendGPSPeriodico(); } catch(e){}
    }
    // Refrescar MI_LAT/MI_LNG silenciosamente
    if (navigator.geolocation){
      navigator.geolocation.getCurrentPosition(function(pos){
        try { MI_LAT = pos.coords.latitude; MI_LNG = pos.coords.longitude; } catch(e){}
      }, function(){}, { enableHighAccuracy:false, timeout:8000, maximumAge:30000 });
    }
  }
});

// ── 3) Tres mensajes configurables por Edgar (inyectados como []) ──
// MSG_CONFIG = [{label, texto}, ...]  — texto admite {cliente} {producto} {total} {rider}
var MSG_CONFIG = (typeof [] !== 'undefined' && [] && [].length)
  ? []
  : [
      { label:'Saliendo', texto:'Hola {cliente}! Soy {rider} de Mundo Importados. Ya salí con tu pedido {producto}. Llego en 1 a 2 horas. Total: {total} (efectivo o transferencia).' },
      { label:'Estoy cerca', texto:'Hola {cliente}! Estoy a pocos minutos de tu ubicación con tu {producto}. Total a abonar: {total}. Te llamo al llegar.' },
      { label:'Llegué', texto:'Hola {cliente}! Llegué a tu ubicación con el pedido. Salgo a tu encuentro. Total: {total}.' }
    ];

function v51Plantilla(txt, p){
  var total = (p.precio||0)*(p.cant||1);
  var nombreRider = (typeof rider!=='undefined' && rider) ? rider.nombre : '';
  return (txt||'')
    .split('{cliente}').join(p.cliente||'')
    .split('{producto}').join(p.prod||'')
    .split('{total}').join(typeof gs==='function'?gs(total):total)
    .split('{rider}').join(nombreRider)
    .split('{ciudad}').join(p.ciudad||'');
}

window.v51EnviarMsgConfig = function(idx, pedidoId){
  var p = null, mp = mis();
  for (var i=0;i<mp.length;i++){ if(mp[i].id===pedidoId){ p=mp[i]; break; } }
  if(!p && typeof PEDIDOS!=='undefined'){ for(var j=0;j<PEDIDOS.length;j++){ if(PEDIDOS[j].id===pedidoId){ p=PEDIDOS[j]; break; } } }
  if(!p) return;
  var cfg = MSG_CONFIG[idx];
  if (!cfg) return;
  var msg = v51Plantilla(cfg.texto, p);
  var tel = typeof waNum==='function' ? waNum(p.tel) : (p.tel||'');
  window.open('https://wa.me/' + tel + '?text=' + encodeURIComponent(msg), '_blank');
};

// Inyectar la fila de 3 botones configurables en cada card de entregas (post-render)
function v51InyectarBotonesMsg(){
  var cards = document.querySelectorAll('#sc-entregas .card[data-pid]');
  var mp = mis();
  cards.forEach(function(card){
    if (card.querySelector('.v51-msgrow')) return;
    var pid = card.getAttribute('data-pid');
    var idx = -1;
    for (var i=0;i<mp.length;i++){ if(mp[i].id===pid){ idx=i; break; } }
    if (idx<0) return;
    var st = (typeof estados!=='undefined' && estados[pid]) || 'pendiente';
    if (st !== 'pendiente') return; // solo pendientes
    var row = document.createElement('div');
    row.className = 'v51-msgrow';
    row.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 14px 14px;';
    var colors = ['#e8400c','#1565c0','#1b7b2f'];
    var html = '';
    MSG_CONFIG.slice(0,3).forEach(function(m, k){
      html += '<button onclick="v51EnviarMsgConfig('+k+',\''+pid+'\')" style="background:'+colors[k]+';color:#fff;border:none;padding:11px 4px;border-radius:9px;font-weight:800;font-size:11px;cursor:pointer;font-family:inherit;touch-action:manipulation;">📲 '+(m.label||('Msg '+(k+1)))+'</button>';
    });
    row.innerHTML = html;
    var cb = card.querySelector('.cb');
    if (cb) cb.appendChild(row); else card.appendChild(row);
  });
}

// Hook a renderEntregas para inyectar los botones
if (typeof window.renderEntregas === 'function' && !window.renderEntregas._v51msg){
  var _origRE = window.renderEntregas;
  window.renderEntregas = function(){
    var r = _origRE.apply(this, arguments);
    try { setTimeout(v51InyectarBotonesMsg, 50); } catch(e){}
    return r;
  };
  window.renderEntregas._v51msg = true;
}

console.log('[v51 delivery] OK — estados bidireccional + GPS foreground + msgs config');
})();


// ══════════════════════════════════════════════════════════════════════════
// v52 — SALIDAS COMO PESTAÑAS PERSISTENTES (TODOS / S1 / S2 / S3)
// Reemplaza la pantalla bloqueante por una barra siempre visible.
// Volver atrás siempre disponible. Vista TODOS cruzada con sello de salida.
// Reporte refleja la pestaña activa + control por resta en TOTAL.
// ══════════════════════════════════════════════════════════════════════════
(function(){
'use strict';

// 1) Desactivar la pantalla bloqueante de selección de salida (v41).
//    Arrancamos siempre en TODOS y dejamos que el rider cambie con pestañas.
try {
  window.mostrarPantallaSalidaV41 = function(){
    var p = document.getElementById('pantallaSalidaV41');
    if (p) p.remove();
    var app = document.querySelector('.app');
    if (app) app.style.display = 'flex';
  };
} catch(e){}

// Helper: total de un pedido
function v52Total(p){ return (p.precio||0) * (p.cant||1); }

// Helper: pedidos del rider logueado (sin filtro de salida)
function v52TodosDelRider(){
  if (typeof PEDIDOS === 'undefined') return [];
  return PEDIDOS.filter(function(p){
    return (typeof rider!=='undefined' && rider && rider.id) ? (!p.rider || p.rider===rider.id) : true;
  });
}

// Helper: estado de un pedido
function v52Estado(id){
  return (typeof estados!=='undefined' && estados[id]) ? estados[id] : 'pendiente';
}

// Cambiar de pestaña de salida
window.v52IrASalida = function(num){
  try {
    window.SALIDA_ACTUAL_V41 = num;
    if (typeof lsW==='function') lsW('mip_d_salida_'+HOY, String(num));
    if (typeof renderEntregas==='function') renderEntregas();
  } catch(e){ console.warn('[v52 irASalida]', e); }
};

// Construir la barra de pestañas
function v52BarraPestanas(){
  var todos = v52TodosDelRider();
  var c = {1:0,2:0,3:0};
  todos.forEach(function(p){
    var s = parseInt(p.salida||0,10);
    if (s===1||s===2||s===3) c[s]++;
  });
  var act = parseInt(window.SALIDA_ACTUAL_V41||0,10);
  var tabs = [
    {n:0, lbl:'TODOS', cnt:todos.length, col:'#1a1a1a'},
    {n:1, lbl:'S1',    cnt:c[1],         col:'#1565c0'},
    {n:2, lbl:'S2',    cnt:c[2],         col:'#7b3eb8'},
    {n:3, lbl:'S3',    cnt:c[3],         col:'#1b7b2f'}
  ];
  var html = '<div id="v52BarraSalidas" style="display:flex;gap:6px;padding:10px 10px 4px;background:#fff;position:sticky;top:0;z-index:20;border-bottom:1px solid #eee;">';
  tabs.forEach(function(t){
    var on = (act===t.n);
    html += '<button onclick="v52IrASalida('+t.n+')" style="flex:1;padding:10px 4px;border:none;border-radius:10px;font-weight:900;font-size:13px;cursor:pointer;font-family:inherit;touch-action:manipulation;'
      + (on
          ? 'background:'+t.col+';color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.18);'
          : 'background:#f2f2f2;color:#888;')
      + '">'+t.lbl
      + '<div style="font-size:10px;font-weight:700;margin-top:2px;opacity:'+(on?'.9':'.7')+';">'+t.cnt+'</div>'
      + '</button>';
  });
  html += '</div>';

  // Si estamos en una salida concreta, botón de cerrar y rendir esa salida
  if (act===1||act===2||act===3){
    html += '<div style="padding:0 10px 8px;background:#fff;">'
      + '<button onclick="v52CerrarYRendir('+act+')" style="width:100%;padding:11px;border:none;border-radius:10px;background:linear-gradient(135deg,#e8400c,#d63808);color:#fff;font-weight:900;font-size:13px;cursor:pointer;font-family:inherit;touch-action:manipulation;">✓ Cerrar y rendir Salida '+act+'</button>'
      + '</div>';
  }
  return html;
}

// Cerrar y rendir: lleva a Resumen (que ya calcula cobrado/neto de la salida activa)
window.v52CerrarYRendir = function(num){
  try {
    var scs = document.querySelectorAll('.sc');
    for (var i=0;i<scs.length;i++) scs[i].classList.remove('on');
    var tabs = document.querySelectorAll('.tab');
    for (var j=0;j<tabs.length;j++) tabs[j].classList.remove('on');
    var rs = document.getElementById('sc-resumen');
    if (rs) rs.classList.add('on');
    // marcar visualmente la tab Resumen
    for (var k=0;k<tabs.length;k++){ if ((tabs[k].textContent||'').indexOf('Resumen')>-1) tabs[k].classList.add('on'); }
    var hdrT = document.getElementById('hdrT'); if (hdrT) hdrT.textContent = 'Rendir Salida '+num;
    if (typeof renderResumen==='function') renderResumen();
    if (typeof showToast==='function') showToast('Rindiendo Salida '+num);
  } catch(e){ console.warn('[v52 cerrarYRendir]', e); }
};

// Inyectar la barra + sellos en vista TODOS, tras cada renderEntregas
function v52PostRender(){
  try {
    var sc = document.getElementById('sc-entregas');
    if (!sc) return;
    // Quitar barra v42 vieja (botón volver) si existe — la reemplazamos
    var viejo = document.getElementById('v42BotonVolver');
    if (viejo) viejo.remove();
    // Quitar barra previa nuestra
    var prevWrap = document.getElementById('v52WrapBarra');
    if (prevWrap) prevWrap.remove();
    // Insertar barra al inicio
    var wrap = document.createElement('div');
    wrap.id = 'v52WrapBarra';
    wrap.innerHTML = v52BarraPestanas();
    sc.insertBefore(wrap, sc.firstChild);

    // En vista TODOS: sello de salida + estado cruzado por tarjeta
    var act = parseInt(window.SALIDA_ACTUAL_V41||0,10);
    if (act===0){
      var byId = {};
      v52TodosDelRider().forEach(function(p){ byId[p.id]=p; });
      var cards = sc.querySelectorAll('.card[data-pid]');
      cards.forEach(function(card){
        if (card.querySelector('.v52-sello')) return;
        var pid = card.getAttribute('data-pid');
        var p = byId[pid];
        if (!p) return;
        var s = parseInt(p.salida||0,10);
        var st = v52Estado(pid);
        var salTxt = (s===1||s===2||s===3) ? ('S'+s) : 'sin salida';
        var salCol = s===1?'#1565c0':s===2?'#7b3eb8':s===3?'#1b7b2f':'#999';
        var estTxt = st==='entregado'?'✓ entregado':st==='no_entregado'?'✗ cancelado':st==='reagendado'?'↻ reagendado':'● pendiente';
        var estCol = st==='entregado'?'#1b7b2f':st==='no_entregado'?'#c52424':st==='reagendado'?'#b06b00':'#e8400c';
        var sello = document.createElement('div');
        sello.className = 'v52-sello';
        sello.style.cssText = 'display:flex;gap:8px;align-items:center;padding:6px 12px;background:#fafafa;border-bottom:1px solid #f0f0f0;';
        sello.innerHTML =
          '<span style="background:'+salCol+';color:#fff;font-size:10px;font-weight:900;padding:3px 9px;border-radius:20px;letter-spacing:.5px;">'+salTxt+'</span>'
          + '<span style="font-size:11px;font-weight:800;color:'+estCol+';">'+estTxt+'</span>';
        card.insertBefore(sello, card.firstChild);
      });
    }
  } catch(e){ console.warn('[v52 postRender]', e); }
}

// Hook a renderEntregas
if (typeof window.renderEntregas==='function' && !window.renderEntregas._v52){
  var _origRE_v52 = window.renderEntregas;
  window.renderEntregas = function(){
    var r = _origRE_v52.apply(this, arguments);
    try { setTimeout(v52PostRender, 0); } catch(e){}
    return r;
  };
  window.renderEntregas._v52 = true;
}

// 3) Reporte: control por resta cuando estamos en TODOS
if (typeof window.generarReporte==='function' && !window.generarReporte._v52){
  var _origGR_v52 = window.generarReporte;
  window.generarReporte = function(){
    var txt = _origGR_v52.apply(this, arguments);
    try {
      var act = parseInt(window.SALIDA_ACTUAL_V41||0,10);
      var lin = '--------------------';
      var g = (typeof gs==='function') ? gs : function(n){ return 'Gs '+(n||0).toLocaleString('es-PY'); };
      if (act===0){
        // CONTROL TOTAL sobre todos los pedidos del rider
        var todos = v52TodosDelRider();
        var salio=0, cobrado=0, envios=0, pend=0, canc=0;
        todos.forEach(function(p){
          var t = v52Total(p);
          salio += t;
          var st = v52Estado(p.id);
          if (st==='entregado'){ cobrado += t; envios += (typeof costoCiudad==='function'?costoCiudad(p.ciudad):0); }
          else if (st==='no_entregado'){ canc += t; }
          else { pend += t; }
        });
        var pagoDel = (typeof costoServ!=='undefined' && costoServ>0) ? costoServ : envios;
        var neto = cobrado - pagoDel;
        txt += '\n'+lin+'\n*CONTROL TOTAL (las 3 salidas)*\n'+lin+'\n';
        txt += 'Salió a la calle: ' + g(salio) + '\n';
        txt += 'Cobrado (entregado): ' + g(cobrado) + '\n';
        if (canc>0) txt += 'No entregado: ' + g(canc) + '\n';
        if (pend>0) txt += 'Pendiente (no procesado): ' + g(pend) + '\n';
        txt += '\n*NETO A EDGAR: ' + g(neto) + '*\n';
      } else {
        txt = '*SALIDA ' + act + '*\n' + txt;
      }
    } catch(e){ console.warn('[v52 reporte]', e); }
    return txt;
  };
  window.generarReporte._v52 = true;
}

// Asegurar arranque en TODOS si no hay salida elegida y re-render inicial
try {
  if (typeof window.SALIDA_ACTUAL_V41==='undefined') window.SALIDA_ACTUAL_V41 = 0;
  setTimeout(function(){
    var ls = document.getElementById('loginScreen');
    if (ls && ls.style.display==='none' && typeof renderEntregas==='function') renderEntregas();
  }, 300);
} catch(e){}

console.log('[v52 salidas] OK — pestañas persistentes + vista cruzada + control por resta');
})();

</script>
